<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.3" />
    </filter>
  </defs>
  <!-- Background rounded card -->
  <rect width="192" height="192" rx="44" fill="url(#bgGrad)" />
  
  <!-- Stylized B2B / Supplier network icon in the center -->
  <g transform="translate(46, 46)" filter="url(#glow)">
    <!-- Central supply hub -->
    <rect x="30" y="30" width="40" height="40" rx="10" fill="#ffffff" />
    <!-- Outlying supplier nodes -->
    <circle cx="15" cy="15" r="10" fill="#e0f2fe" />
    <circle cx="85" cy="15" r="10" fill="#e0f2fe" />
    <circle cx="50" cy="85" r="10" fill="#e0f2fe" />
    <!-- Connector lines representing procurement pipelines -->
    <line x1="22" y1="22" x2="35" y2="35" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.8" />
    <line x1="78" y1="22" x2="65" y2="35" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.8" />
    <line x1="50" y1="75" x2="50" y2="70" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.8" />
    <line x1="50" y1="75" x2="50" y2="80" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.8" />
  </g>
</svg>
