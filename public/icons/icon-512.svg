<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#000000" flood-opacity="0.3" />
    </filter>
  </defs>
  <!-- Background rounded card -->
  <rect width="512" height="512" rx="116" fill="url(#bgGrad)" />
  
  <!-- Stylized B2B / Supplier network icon in the center -->
  <g transform="translate(122, 122)" filter="url(#glow)">
    <!-- Central supply hub -->
    <rect x="80" y="80" width="108" height="108" rx="26" fill="#ffffff" />
    <!-- Outlying supplier nodes -->
    <circle cx="40" cy="40" r="28" fill="#e0f2fe" />
    <circle cx="228" cy="40" r="28" fill="#e0f2fe" />
    <circle cx="134" cy="228" r="28" fill="#e0f2fe" />
    <!-- Connector lines representing procurement pipelines -->
    <line x1="60" y1="60" x2="95" y2="95" stroke="#ffffff" stroke-width="10" stroke-linecap="round" opacity="0.8" />
    <line x1="208" y1="60" x2="173" y2="95" stroke="#ffffff" stroke-width="10" stroke-linecap="round" opacity="0.8" />
    <line x1="134" y1="200" x2="134" y2="188" stroke="#ffffff" stroke-width="10" stroke-linecap="round" opacity="0.8" />
    <line x1="134" y1="200" x2="134" y2="210" stroke="#ffffff" stroke-width="10" stroke-linecap="round" opacity="0.8" />
  </g>
</svg>
